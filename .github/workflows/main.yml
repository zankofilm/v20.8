name: Build Native Admin No Port

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-native-admin:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        shell: pwsh
        run: npm install

      - name: Build native admin setup without publish
        shell: pwsh
        env:
          GH_TOKEN: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_CACHE: "${{ github.workspace }}\\.cache\\electron-builder"
        run: npm run dist

      - name: Upload native admin output
        uses: actions/upload-artifact@v4
        with:
          name: JavanroodAdmin_Native_NoPort_V110
          path: installer_output/*
